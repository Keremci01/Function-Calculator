<!DOCTYPE html>
<html>
<head>
<title>Function Calculator</title>

<script src="https://www.desmos.com/api/v1.6/calculator.js?apiKey=desmos"></script>

<style>
body{
  margin:0;
  font-family:Arial;
}

#topbar{
  padding:10px;
  background:white;
}

#calculator{
  width:100%;
  height:90vh;
}
</style>

</head>

<body>

<div id="topbar">
<h2>Fonksiyon Yaz</h2>
<input id="func" placeholder="x^2">
<button onclick="draw()">Grafiği Çiz</button>
</div>

<div id="calculator"></div>

<script>

window.onload = function(){

  var elt = document.getElementById("calculator");
  window.calculator = Desmos.GraphingCalculator(elt);

}

function draw(){

  var f = document.getElementById("func").value;

  calculator.setExpression({
    id:"graph1",
    latex:"y="+f
  });

}

</script>

</body>
</html>
