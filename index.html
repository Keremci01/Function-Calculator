<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sürat Zaman Grafiği</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">
    <h1>Sürat - Zaman Grafiği</h1>

    <div class="controls">
        <input type="number" id="speed" placeholder="Sürat (m/s)">
        <input type="number" id="time" placeholder="Zaman (s)">
        <button onclick="addData()">Ekle</button>
        <button onclick="clearData()">Temizle</button>
    </div>

    <canvas id="chart"></canvas>
</div>

<script src="app.js"></script>
</body>
</html>
