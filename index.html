```html
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Function Calculator</title>

<script src="https://cdn.jsdelivr.net/npm/function-plot/dist/function-plot.js"></script>

<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
font-family:Arial;
}

#plot{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

#panel{
position:absolute;
top:10px;
left:10px;
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
z-index:10;
}
</style>

</head>

<body>

<div id="panel">
Fonksiyon:
<input id="func" value="x^2">
<button onclick="draw()">Çiz</button>
</div>

<div id="plot"></div>

<script>

function draw(){

var f = document.getElementById("func").value;

functionPlot({
target:'#plot',
width: window.innerWidth,
height: window.innerHeight,
grid:true,
data:[{
fn:f
}]
});

}

window.onload = draw;

window.onresize = draw;

</script>

</body>
</html>
