```html
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Function Calculator</title>

<script src="https://cdn.jsdelivr.net/npm/function-plot/dist/function-plot.js"></script>

<style>
body{
font-family: Arial;
margin:0;
overflow:hidden;
}

#panel{
position:absolute;
top:10px;
left:10px;
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
z-index:10;
}

#plot{
width:100vw;
height:100vh;
}
</style>

</head>

<body>

<div id="panel">
<h3>Fonksiyon Yaz</h3>
<input id="func" value="x^2">
<button onclick="draw()">Grafiği Çiz</button>
</div>

<div id="plot"></div>

<script>

function draw(){

var f = document.getElementById("func").value;

functionPlot({
target:'#plot',
grid:true,
data:[{
fn:f
}]
});

}
```
