<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grafik</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
</head>
<body>

<div class="container">

<h1 id="title">Sürat - Zaman Grafiği</h1>

<div class="menu">
<button onclick="showPage('surat')">Sürat</button>
<button onclick="showPage('konum')">Konum</button>
<button onclick="showPage('ivme')">İvme</button>
<button onclick="chart.resetZoom()">Reset Zoom</button>
</div>

<div class="controls">
<input type="number" id="speed" placeholder="Değer">
<input type="number" id="time" placeholder="Zaman">
<button onclick="addData()">Ekle</button>
<button onclick="clearData()">Temizle</button>
</div>

<canvas id="chart"></canvas>

</div>

<script src="app.js"></script>
</body>
</html>
